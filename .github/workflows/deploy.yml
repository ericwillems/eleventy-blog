name: Deploy 11ty Site
on:
  push:
    branches: ["main"] # Trigger on pushes to your main branch
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install
      - run: npm run build # Your build command
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site/" # Default 11ty output folder
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
